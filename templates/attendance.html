{% extends "base.html" %}
{% block title %}Attendance{% endblock %}
{% block content %}
<div class="panel">
  <form method="post" class="inline">
    <select name="status"><option>Present</option><option>Break</option><option>Left</option></select>
    <button class="btn primary">Mark Attendance</button>
  </form>
</div>
<div class="panel">
<table>
<tr><th>User</th><th>Status</th><th>Branch</th><th>Time</th></tr>
{% for r in rows %}
<tr><td>{{ r.username }}</td><td>{{ r.status }}</td><td>{{ r.branch }}</td><td>{{ r.marked_at }}</td></tr>
{% endfor %}
</table>
</div>
{% endblock %}
