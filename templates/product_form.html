{% extends "base.html" %}
{% block title %}{{ "Edit Product" if product else "Add Product" }}{% endblock %}
{% block content %}
<div class="panel form-panel">
<form method="post">
  <div class="form-grid">
    <label>Barcode / QR Value
      <div class="barcode-field">
        <input id="barcodeInput" name="barcode" required value="{{ product.barcode if product else '' }}" placeholder="Scan or type barcode">
        <button type="button" class="btn primary scan-btn" onclick="openProductScanner()">Scan</button>
      </div>
    </label>

    <label>Product Name <input name="name" required value="{{ product.name if product else '' }}"></label>
    <label>Category <input name="category" required value="{{ product.category if product else '' }}"></label>
    <label>Brand <input name="brand" value="{{ product.brand if product else '' }}"></label>
    <label>Cost Price <input name="cost_price" type="number" step="0.01" value="{{ product.cost_price if product else 0 }}"></label>
    <label>Selling Price <input name="selling_price" required type="number" step="0.01" value="{{ product.selling_price if product else '' }}"></label>
    <label>Quantity <input name="quantity" required type="number" value="{{ product.quantity if product else 0 }}"></label>
    <label>Low Stock Limit <input name="low_stock_limit" type="number" value="{{ product.low_stock_limit if product else 5 }}"></label>
    <label>Expiry Date <input name="expiry_date" type="date" value="{{ product.expiry_date if product else '' }}"></label>
  </div>

  <button class="btn primary">Save Product</button>
  <a class="btn light" href="/inventory">Cancel</a>
</form>
</div>

<div id="productScannerModal" class="modal-backdrop" style="display:none">
  <div class="modal-card">
    <div class="modal-head">
      <h3>Scan Barcode / QR</h3>
      <button type="button" class="mini danger-btn" onclick="closeProductScanner()">Close</button>
    </div>

    <p class="muted">Point your camera at the barcode/QR. Once detected, it will automatically fill the barcode field.</p>

    <video id="productScannerVideo" class="scanner-video"></video>

    <div class="inline scan-buttons">
      <button type="button" class="btn primary" onclick="startProductScanner()">Start Camera</button>
      <button type="button" class="btn light" onclick="stopProductScanner()">Stop</button>
    </div>

    <div class="panel soft">
      <h4>Scan from Image</h4>
      <input type="file" accept="image/*" onchange="scanProductImage(event)">
    </div>

    <p id="productScannerStatus" class="muted"></p>
  </div>
</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script>
let productCodeReader = null;

const productHints = new Map();
productHints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
  ZXing.BarcodeFormat.EAN_13,
  ZXing.BarcodeFormat.EAN_8,
  ZXing.BarcodeFormat.UPC_A,
  ZXing.BarcodeFormat.UPC_E,
  ZXing.BarcodeFormat.CODE_128,
  ZXing.BarcodeFormat.CODE_39,
  ZXing.BarcodeFormat.ITF,
  ZXing.BarcodeFormat.QR_CODE
]);

function fillProductBarcode(value){
  document.getElementById("barcodeInput").value = value;
  const status = document.getElementById("productScannerStatus");
  status.innerHTML = "Detected: <b>" + value + "</b>";
  try { softBeep("success"); } catch(e) {}
  setTimeout(closeProductScanner, 600);
}

function openProductScanner(){
  document.getElementById("productScannerModal").style.display = "flex";
  document.getElementById("productScannerStatus").textContent = "";
  startProductScanner();
}

function closeProductScanner(){
  stopProductScanner();
  document.getElementById("productScannerModal").style.display = "none";
}

async function startProductScanner(){
  const video = document.getElementById("productScannerVideo");
  const status = document.getElementById("productScannerStatus");

  if(!window.ZXing){
    status.textContent = "Scanner library could not load. Please type barcode manually.";
    return;
  }

  try{
    stopProductScanner();

    productCodeReader = new ZXing.BrowserMultiFormatReader(productHints, 500);
    const devices = await productCodeReader.listVideoInputDevices();

    if(!devices || devices.length === 0){
      status.textContent = "No camera found. You can upload an image or type barcode manually.";
      return;
    }

    const backCamera = devices.find(d => /back|rear|environment/i.test(d.label));
    const selectedDeviceId = backCamera ? backCamera.deviceId : devices[0].deviceId;

    status.textContent = "Camera started. Align barcode inside the camera view.";

    productCodeReader.decodeFromVideoDevice(selectedDeviceId, video, (result, error) => {
      if(result){
        fillProductBarcode(result.getText());
      }
    });
  }catch(err){
    status.textContent = "Camera could not start. Allow camera permission or use image/manual entry.";
  }
}

function stopProductScanner(){
  try{
    if(productCodeReader){
      productCodeReader.reset();
    }
  }catch(e){}
}

async function scanProductImage(event){
  const file = event.target.files && event.target.files[0];
  const status = document.getElementById("productScannerStatus");
  if(!file) return;

  try{
    const reader = new ZXing.BrowserMultiFormatReader(productHints, 500);
    const imageUrl = URL.createObjectURL(file);

    const img = document.createElement("img");
    img.src = imageUrl;
    img.style.display = "none";
    document.body.appendChild(img);

    await new Promise((resolve, reject) => {
      img.onload = resolve;
      img.onerror = reject;
    });

    const result = await reader.decodeFromImageElement(img);

    document.body.removeChild(img);
    URL.revokeObjectURL(imageUrl);

    if(result && result.getText()){
      fillProductBarcode(result.getText());
    }else{
      throw new Error("No barcode found");
    }
  }catch(err){
    status.textContent = "Could not read this image. Try a clearer/cropped barcode image.";
    try { softBeep("warn"); } catch(e) {}
  }
}
</script>
{% endblock %}
