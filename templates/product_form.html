{% extends "base.html" %}
{% block title %}{{ "Edit Product" if product else "Add Product" }}{% endblock %}
{% block content %}
<div class="panel form-panel"><form method="post"><div class="form-grid">
<label>Barcode / QR Value <div class="barcode-field"><input id="barcodeInput" name="barcode" required value="{{ product.barcode if product else '' }}" placeholder="Scan or type barcode"><button type="button" class="btn primary scan-btn" onclick="openProductScanner()">Scan</button></div></label>
<label>Product Name <input name="name" required value="{{ product.name if product else '' }}"></label>
<label>Category <input name="category" required value="{{ product.category if product else '' }}"></label>
<label>Brand <input name="brand" value="{{ product.brand if product else '' }}"></label>
<label>Cost Price <input name="cost_price" type="number" step="0.01" value="{{ product.cost_price if product else 0 }}"></label>
<label>Selling Price <input name="selling_price" required type="number" step="0.01" value="{{ product.selling_price if product else '' }}"></label>
<label>Quantity <input name="quantity" required type="number" value="{{ product.quantity if product else 0 }}"></label>
<label>Low Stock Limit <input name="low_stock_limit" type="number" value="{{ product.low_stock_limit if product else 5 }}"></label>
<label>Expiry Date <input name="expiry_date" type="date" value="{{ product.expiry_date if product else '' }}"></label>
</div><button class="btn primary">Save Product</button><a class="btn light" href="/inventory">Cancel</a></form></div>
<div id="productScannerModal" class="modal-backdrop" style="display:none"><div class="modal-card"><div class="modal-head"><h3>Scan Barcode / QR</h3><button type="button" class="mini danger-btn" onclick="closeProductScanner()">Close</button></div><p class="muted">Detected value will automatically fill the barcode field.</p><video id="productScannerVideo" class="scanner-video"></video><div class="inline scan-buttons"><button type="button" class="btn primary" onclick="startProductScanner()">Start Camera</button><button type="button" class="btn light" onclick="stopProductScanner()">Stop</button></div><div class="panel soft"><h4>Scan from Image</h4><input type="file" accept="image/*" onchange="scanProductImage(event)"></div><p id="productScannerStatus" class="muted"></p></div></div>
<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="/static/js/product_scanner.js"></script>
{% endblock %}
